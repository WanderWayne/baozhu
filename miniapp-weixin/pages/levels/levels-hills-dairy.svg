<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1" preserveAspectRatio="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FDF8E8"/>
      <stop offset="38%"  stop-color="#F8EFD5"/>
      <stop offset="68%"  stop-color="#F1E1B8"/>
      <stop offset="100%" stop-color="#E8D4A0"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FDF8E8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FDF5E0" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFDF0" stop-opacity="0.48"/>
    </linearGradient>
  </defs>

  <rect width="1" height="1" fill="url(#sky)"/>

  <!--
    第一层：左侧一个宽缓大包，右侧缓降后微微回升
    特点：非对称，单峰，峰在左 1/3 处
  -->
  <path
    d="M0,0.34
       C0.06,0.27  0.22,0.24  0.40,0.26
       C0.54,0.29  0.66,0.33  0.78,0.29
       C0.90,0.26  0.97,0.31  1,0.30
       L1,1 L0,1 Z"
    fill="rgba(222,202,160,0.13)"/>

  <!--
    第二层：从左侧低处出发，在右侧 60% 处形成主峰，
    左肩有一个小隆起，与第一层错峰
    特点：左低右高，主峰偏右
  -->
  <path
    d="M0,0.46
       C0.08,0.46  0.20,0.43  0.32,0.42
       C0.42,0.41  0.50,0.38  0.60,0.36
       C0.72,0.34  0.84,0.40  0.92,0.38
       C0.97,0.37  1,0.40  1,0.40
       L1,1 L0,1 Z"
    fill="rgba(208,182,136,0.19)"/>

  <!--
    第三层：两座不等高的山包，中间有一个浅谷，
    左包矮宽，右包高窄，起伏更明显
    特点：双峰 + 谷，最有变化
  -->
  <path
    d="M0,0.54
       C0.08,0.48  0.20,0.47  0.32,0.51
       C0.42,0.55  0.50,0.57  0.58,0.52
       C0.65,0.47  0.74,0.45  0.84,0.49
       C0.92,0.52  0.97,0.52  1,0.51
       L1,1 L0,1 Z"
    fill="rgba(196,166,116,0.24)"/>

  <!-- 底部薄雾：渐变淡出，不是可见图形 -->
  <rect x="0" y="0.73" width="1" height="0.27" fill="url(#mist)"/>
</svg>
